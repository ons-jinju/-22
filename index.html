<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#2d7a3a"/>
  <title>기운이 샘솟는 명당 22곳 🔖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --moss: #2d7a3a;
      --bamboo: #52a85e;
      --sand: #e8f5e9;
      --earth: #a5d6a7;
      --ink: #1b2e1c;
      --mist: #f1f8f2;
      --crimson: #c0392b;
      --gold: #f9a825;
      --stamp: #c0392b;
      /* 배경 이미지 — 안개 낀 여름 숲 */
      --bg-img: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=960&q=85');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--ink);
      /* 전체 앱 배경 — 숲 이미지 고정 */
      background: var(--bg-img) center/cover fixed;
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      /* 배경이 비치도록 투명 유지 */
      background: transparent;
    }

    /* ── HEADER ── */
    .app-header {
      background:
        linear-gradient(135deg,
          rgba(15,50,20,0.88) 0%,
          rgba(30,85,40,0.80) 60%,
          rgba(45,122,58,0.72) 100%),
        var(--bg-img) center top/cover;
      color: white;
      padding: 14px 16px 12px;
      flex-shrink: 0;
      z-index: 300;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(2px);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .logo-wrap h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .logo-wrap p { font-size: 10px; opacity: 0.7; margin-top: 1px; }

    .progress-compact {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ring-wrap {
      position: relative;
      width: 48px; height: 48px;
      flex-shrink: 0;
    }

    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 5; }
    .ring-val { fill: none; stroke: #FEE500; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }

    .ring-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #FEE500; line-height: 1;
    }

    .ring-text small { font-size: 8px; color: rgba(255,255,255,0.65); font-weight: 400; }

    .header-actions { display: flex; gap: 6px; align-items: center; }

    .btn-hdr {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      color: white;
      padding: 5px 11px;
      font-size: 11px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-hdr:active { opacity: 0.75; }

    /* ── TAB BAR ── */
    .tab-bar {
      display: flex;
      background: rgba(15,50,20,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
    }

    .tab-btn.active {
      color: #FEE500;
      border-bottom-color: #FEE500;
      font-weight: 700;
    }

    /* ── MAP VIEW ── */
    .view { flex: 1; overflow: hidden; position: relative; display: none; }
    .view.active { display: flex; flex-direction: column; }

    #map { flex: 1; min-height: 0; width: 100%; }

    /* Bottom sheet (map) */
    .bottom-sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(240,250,242,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.25);
      border-top: 1px solid rgba(255,255,255,0.7);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
      z-index: 200;
      max-height: 65vh;
      overflow-y: auto;
    }

    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: #ddd; border-radius: 2px;
      margin: 10px auto 0;
    }

    .sheet-body { padding: 12px 16px 20px; }

    .sheet-toprow {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .sheet-num {
      width: 28px; height: 28px;
      background: var(--sand);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--moss);
      font-family: 'Noto Serif KR', serif;
      flex-shrink: 0; margin-right: 10px; margin-top: 2px;
    }

    .sheet-info { flex: 1; }
    .sheet-place { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .sheet-name { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .cat-chip { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; display: inline-block; margin-bottom: 6px; }
    .sheet-when { font-size: 12px; color: #666; font-style: italic; line-height: 1.5; margin-bottom: 12px; }

    .sheet-close {
      background: none; border: none; font-size: 20px; color: #bbb; cursor: pointer; padding: 0 0 4px 8px;
    }

    .sheet-actions { display: flex; gap: 8px; }

    .sa-btn {
      flex: 1;
      padding: 9px 6px;
      border-radius: 10px;
      border: none;
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .sa-stamp { background: var(--sand); color: var(--moss); }
    .sa-stamp.done { background: #fff0f0; color: var(--stamp); }
    .sa-ts { background: var(--moss); color: white; }
    .sa-ts.disabled { background: #eee; color: #bbb; cursor: default; }
    .sa-map { background: #FEE500; color: #3C1E1E; }

    .sheet-photo-row {
      display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
    }

    .sph-thumb {
      width: 60px; height: 60px; border-radius: 8px;
      object-fit: cover; border: 2px solid #eee; cursor: pointer;
    }

    .sph-add {
      width: 60px; height: 60px; border-radius: 8px;
      border: 2px dashed #ddd; background: #f9f9f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; color: #ccc;
    }

    .sph-add:hover { border-color: var(--bamboo); color: var(--bamboo); }

    /* ── LIST VIEW ── */
    #listView { overflow-y: auto; flex-direction: column; }

    .filter-scroll {
      display: flex; gap: 6px; padding: 10px 14px;
      overflow-x: auto;
      background: rgba(10,40,15,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; flex-shrink: 0;
    }

    .filter-scroll::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.3); border-radius: 20px;
      padding: 5px 12px; font-size: 12px; cursor: pointer;
      background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85);
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.2s; white-space: nowrap;
    }

    .filter-chip.active {
      background: var(--moss); border-color: var(--bamboo); color: white; font-weight: 600;
      box-shadow: 0 2px 12px rgba(45,122,58,0.5);
    }

    .cards { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }

    /* 유리(glass) 카드 */
    .card {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.6);
    }

    .card.stamped {
      border: 2px solid var(--moss);
      background: rgba(230,248,232,0.88);
    }

    .card-top {
      display: flex; gap: 0; padding: 12px 14px 10px; align-items: flex-start;
    }

    .num-badge {
      width: 26px; height: 26px; background: var(--sand); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--moss);
      flex-shrink: 0; margin-right: 10px; margin-top: 2px;
      font-family: 'Noto Serif KR', serif;
    }

    .card.stamped .num-badge { background: var(--moss); color: white; }

    .card-info { flex: 1; min-width: 0; }
    .card-place { font-size: 10px; color: #bbb; margin-bottom: 1px; }
    .card-name { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700; }
    .card-when { font-size: 11px; color: #777; font-style: italic; margin-top: 3px; line-height: 1.4; }

    .stamp-col {
      display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0;
    }

    .stamp-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px dashed #ddd; background: #f9f9f9;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px;
      transition: all 0.2s; position: relative; overflow: hidden;
    }

    .stamp-btn.done { border: 2.5px solid var(--stamp); background: #fff0f0; }

    .stamp-btn .s-img { display: none; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .stamp-btn.has-photo .s-img { display: block; }
    .stamp-btn.has-photo .s-icon { display: none; }

    .s-overlay {
      position: absolute; inset: 0; background: rgba(192,57,43,0.2);
      display: none; align-items: center; justify-content: center; font-size: 22px; z-index: 2;
    }

    .stamp-btn.done .s-overlay { display: flex; }
    .stamp-lbl { font-size: 9px; color: #bbb; }
    .stamp-btn.done + .stamp-lbl { color: var(--stamp); font-weight: 600; }

    .card-actions {
      display: flex; border-top: 1px solid #f0ebe0;
    }

    .action-btn {
      flex: 1; padding: 8px 4px; text-align: center; font-size: 11px;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
      border: none; background: transparent; color: #888;
      display: flex; align-items: center; justify-content: center; gap: 3px;
      transition: background 0.15s; text-decoration: none;
    }

    .action-btn:not(:last-child) { border-right: 1px solid #f0ebe0; }
    .action-btn:hover { background: var(--mist); }
    .action-btn.ts { color: var(--moss); font-weight: 600; }
    .action-btn.map { color: #e65100; }
    .action-btn.photo { color: #1565c0; }
    .action-btn.disabled { color: #ddd; cursor: default; }
    .action-btn.disabled:hover { background: transparent; }

    .photo-strip { display: none; padding: 0 12px 10px; gap: 6px; flex-wrap: wrap; }
    .photo-strip.show { display: flex; }

    .p-thumb { width: 58px; height: 58px; border-radius: 8px; object-fit: cover; border: 2px solid #eee; cursor: pointer; }
    .p-add {
      width: 58px; height: 58px; border-radius: 8px; border: 2px dashed #ddd;
      background: #f9f9f9; display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; color: #ccc;
    }

    /* Category colors */
    .cat-시험 { background: #e3f2fd; color: #1565c0; }
    .cat-관운 { background: #fce4ec; color: #c2185b; }
    .cat-인간관계 { background: #f3e5f5; color: #6a1b9a; }
    .cat-가족 { background: #fff3e0; color: #e65100; }
    .cat-건강 { background: #e8f5e9; color: #2e7d32; }
    .cat-새출발 { background: #fff8e1; color: #f57f17; }
    .cat-기운충전 { background: #fbe9e7; color: #bf360c; }

    /* Leaflet custom popup */
    .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 4px 20px rgba(44,36,22,0.2) !important; }
    .map-popup { font-family: 'Noto Sans KR', sans-serif; min-width: 150px; }
    .map-popup h3 { font-family: 'Noto Serif KR', serif; font-size: 15px; color: var(--moss); margin-bottom: 2px; }
    .map-popup p { font-size: 11px; color: #888; margin-bottom: 8px; }
    .map-popup button {
      background: var(--moss); color: white; border: none; border-radius: 8px;
      padding: 6px 12px; font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; width: 100%; font-weight: 600;
    }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 72vh; border-radius: 12px; object-fit: contain; }
    .lb-close { color: white; font-size: 26px; cursor: pointer; opacity: 0.7; }
    .lb-del { background: var(--crimson); color: white; border: none; border-radius: 20px; padding: 8px 20px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

    /* Toast */
    .toast {
      display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: white; padding: 10px 22px; border-radius: 24px;
      font-size: 13px; z-index: 998; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    #fileInput { display: none; }
    footer { text-align: center; padding: 20px 16px; color: rgba(255,255,255,0.5); font-size: 11px; }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-top">
      <div class="logo-wrap">
        <h1>🏯 기운이 샘솟는 명당 22곳</h1>
        <p>조용헌의 풍수 명당 · 나만의 도장깨기</p>
      </div>
      <div class="header-actions">
        <div class="progress-compact">
          <div class="ring-wrap">
            <svg width="48" height="48" viewBox="0 0 48 48">
              <circle class="ring-bg" cx="24" cy="24" r="19"/>
              <circle class="ring-val" id="ringVal" cx="24" cy="24" r="19"
                stroke-dasharray="119.4" stroke-dashoffset="119.4"/>
            </svg>
            <div class="ring-text">
              <span id="doneCount">0</span>
              <small>/ 22</small>
            </div>
          </div>
        </div>
        <button class="btn-hdr" onclick="shareApp()">📤 공유</button>
      </div>
    </div>
  </header>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-map" onclick="showView('map')">🗺 지도 보기</button>
    <button class="tab-btn" id="tab-list" onclick="showView('list')">📋 목록 보기</button>
  </div>

  <!-- MAP VIEW -->
  <div class="view active" id="mapView">
    <div id="map"></div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet" id="bottomSheet">
      <div class="sheet-handle"></div>
      <div class="sheet-body">
        <div class="sheet-toprow">
          <div class="sheet-num" id="s-num"></div>
          <div class="sheet-info">
            <div class="sheet-place" id="s-place"></div>
            <div class="sheet-name" id="s-name"></div>
            <span class="cat-chip" id="s-cat"></span>
            <div class="sheet-when" id="s-when"></div>
            <div class="sheet-actions">
              <button class="sa-btn sa-stamp" id="s-stamp-btn" onclick="toggleCheckFromSheet()">🔖 도장 찍기</button>
              <a class="sa-btn sa-ts" id="s-ts-btn" href="#" target="_blank">🏯 예약</a>
              <a class="sa-btn sa-map" id="s-map-btn" href="#" target="_blank">🗺 길찾기</a>
            </div>
            <div class="sheet-photo-row" id="s-photos"></div>
          </div>
          <button class="sheet-close" onclick="closeSheet()">✕</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div class="view" id="listView">
    <div class="filter-scroll">
      <button class="filter-chip active" onclick="filter('all',this)">전체 22곳</button>
      <button class="filter-chip" onclick="filter('시험',this)">📚 시험·합격</button>
      <button class="filter-chip" onclick="filter('관운',this)">🏅 관운·승진</button>
      <button class="filter-chip" onclick="filter('인간관계',this)">🤝 인간관계</button>
      <button class="filter-chip" onclick="filter('가족',this)">🏠 가족·집안</button>
      <button class="filter-chip" onclick="filter('건강',this)">💚 건강·치유</button>
      <button class="filter-chip" onclick="filter('새출발',this)">🌅 새출발</button>
      <button class="filter-chip" onclick="filter('기운충전',this)">⚡ 기운충전</button>
      <button class="filter-chip" onclick="filter('done',this)">✅ 완료</button>
    </div>
    <div style="flex:1;overflow-y:auto;">
      <div class="cards" id="cardList"></div>
      <footer>데이터 출처: 조용헌 명당 22곳 · 사진은 내 기기에만 저장됩니다</footer>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="lbBg(event)">
  <div class="lb-close" onclick="closeLb()">✕</div>
  <img id="lbImg" src="" alt="인증샷"/>
  <button class="lb-del" onclick="deletePhoto()">🗑 사진 삭제</button>
</div>

<input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handlePhoto(event)"/>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  데이터
// ══════════════════════════════════════════
const SPOTS = [
  {id:1, name:"봉정암", place:"인제 설악산", addr:"강원 인제군 북면 백담로 1700", when:"인생에서 큰 고비를 맞이했을 때", cat:"새출발", tsSearch:"백담사", lat:38.1017, lng:128.4781},
  {id:2, name:"삼학산", place:"파주", addr:"경기 파주시 산남동", when:"막힌 기운을 가볍게 풀고 싶을 때", cat:"기운충전", tsSearch:null, lat:37.7400, lng:126.7700},
  {id:3, name:"연주암", place:"과천 관악산", addr:"경기 과천시 자하동길 63", when:"시험 합격 및 승진 등 합격운이 필요할 때", cat:"시험", tsSearch:"연주암", lat:37.4458, lng:126.9633},
  {id:4, name:"환벽정", place:"괴산", addr:"충북 괴산군 칠성면 사은리 산4-1", when:"인간관계에 문제가 있거나 선택이 필요할 때", cat:"인간관계", tsSearch:null, lat:36.8500, lng:127.8000},
  {id:5, name:"부석사", place:"서산 도비산", addr:"충남 서산시 부석면 부석사길 243", when:"인간관계에 문제가 생겼을 때", cat:"인간관계", tsSearch:"부석사", lat:36.6500, lng:126.4500},
  {id:6, name:"마곡사", place:"공주 태화산", addr:"충남 공주시 사곡면 마곡사로 966", when:"인생의 전환점을 맞이했을 때", cat:"새출발", tsSearch:"마곡사", lat:36.6068, lng:126.9109},

  {id:9, name:"학성서원", place:"김제 비산비야", addr:"전북 김제시 성덕면 대석리", when:"문서운이나 시험운을 빌고 싶을 때", cat:"시험", tsSearch:null, lat:35.8500, lng:126.8000},

  {id:11, name:"석천암", place:"완주 대둔산", addr:"전북 완주군 운주면 산북리 611-34", when:"시험·자격증·취업 준비 등 학업운이 필요할 때", cat:"시험", tsSearch:null, lat:36.1200, lng:127.1500},

  {id:16, name:"대견사", place:"대구 비슬산", addr:"대구 달성군 유가읍 일연선사길 177", when:"사업이나 진로가 풀리지 않을 때", cat:"새출발", tsSearch:"대견사", lat:35.6800, lng:128.5700},

  {id:18, name:"쌍계사 불일암", place:"하동", addr:"경남 하동군 화개면 쌍계사길 59", when:"중심을 잡거나 차분함이 필요할 때", cat:"건강", tsSearch:"쌍계사", lat:35.1917, lng:127.6300},
  {id:19, name:"보리암", place:"남해 금산", addr:"경남 남해군 상주면 보리암로 665", when:"중요한 시험·취업·이직을 앞뒀을 때", cat:"시험", tsSearch:"보리암", lat:34.8700, lng:127.9000},
  {id:20, name:"백련사", place:"강진 만덕산", addr:"전남 강진군 도암면 백련사길 145", when:"학업, 시험에 막혔을 때", cat:"시험", tsSearch:"백련사", lat:34.6100, lng:126.8500},
  {id:21, name:"도솔암", place:"해남 달마산", addr:"전남 해남군 송지면 마봉송종길 355-300", when:"한계에 부딪히거나 새로운 시작이 필요할 때", cat:"새출발", tsSearch:null, lat:34.4800, lng:126.5500},
  {id:22, name:"향일암", place:"여수 금오산", addr:"전남 여수시 돌산읍 향일암로 1", when:"새로운 시작에 앞서 좋은 흐름이 필요할 때", cat:"새출발", tsSearch:"향일암", lat:34.6500, lng:127.8700}
];

const CAT_EMOJI = {시험:'📚',관운:'🏅',인간관계:'🤝',가족:'🏠',건강:'💚',새출발:'🌅',기운충전:'⚡'};

// ══════════════════════════════════════════
//  Storage
// ══════════════════════════════════════════
function load() { try { return JSON.parse(localStorage.getItem('myplace22')||'{}'); } catch { return {}; } }
function saveState() { localStorage.setItem('myplace22', JSON.stringify(state)); }

let state = load();
function getS(id) { return state[id] || {checked:false,photos:[]}; }

// ══════════════════════════════════════════
//  Tab switching
// ══════════════════════════════════════════
let currentView = 'map';

function showView(v) {
  currentView = v;
  document.getElementById('mapView').classList.toggle('active', v==='map');
  document.getElementById('listView').classList.toggle('active', v==='list');
  document.getElementById('tab-map').classList.toggle('active', v==='map');
  document.getElementById('tab-list').classList.toggle('active', v==='list');
  if (v==='map') {
    // 지도 탭으로 돌아올 때 크기 재계산
    requestAnimationFrame(() => {
      if (leafMap) leafMap.invalidateSize();
    });
  }
  if (v==='list') renderCards();
}

// ══════════════════════════════════════════
//  Map
// ══════════════════════════════════════════
let leafMap, mapMarkers = {};
let sheetSpotId = null;
let sheetJustOpened = false; // 마커 클릭 직후 지도 click 이벤트 차단용

window.addEventListener('DOMContentLoaded', () => {
  // 레이아웃이 완전히 잡힌 후 지도 초기화 (높이 0 버그 방지)
  requestAnimationFrame(() => {
    setTimeout(initMap, 80);
  });
  updateProgress();
  renderCards();
});

function initMap() {
  leafMap = L.map('map', { zoomControl: false }).setView([36.2, 127.8], 7);

  // CartoDB Voyager — 컬러풀하고 지형감 있는 타일
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(leafMap);

  L.control.zoom({ position: 'topright' }).addTo(leafMap);

  SPOTS.forEach(p => placeMarker(p));

  // 타일 다 뜬 후 크기 재계산
  leafMap.whenReady(() => leafMap.invalidateSize());

  // 지도 빈 곳 클릭 시 시트 닫기 (마커·줌 클릭 직후는 차단)
  leafMap.on('click', (e) => {
    if (sheetJustOpened) return;
    const target = e.originalEvent && e.originalEvent.target;
    if (target && target.closest('.leaflet-control')) return;
    closeSheet();
  });
}

function markerIcon(p) {
  const s = getS(p.id);
  const checked = s.checked;
  const bg     = checked ? '#c0392b' : '#2d7a3a';
  const border  = checked ? '#ff8a80' : '#a5d6a7';
  const icon    = checked ? '✅' : CAT_EMOJI[p.cat];
  // 라벨 너비를 이름 길이에 맞게 (한 글자 약 13px)
  const w = Math.max(56, p.name.length * 14 + 20);
  return L.divIcon({
    className: '',
    html: `<div style="
        display:inline-flex;flex-direction:column;align-items:center;
        font-family:'Noto Sans KR',sans-serif;">
      <!-- 라벨 pill -->
      <div style="
        background:${bg};
        color:white;
        padding:4px 9px;
        border-radius:14px;
        font-size:12px;
        font-weight:700;
        white-space:nowrap;
        box-shadow:0 2px 8px rgba(0,0,0,0.32);
        border:2px solid ${border};
        display:flex;align-items:center;gap:4px;
        line-height:1.3;">
        <span style="font-size:11px;">${icon}</span>${p.name}
      </div>
      <!-- 삼각 꼬리 -->
      <div style="
        width:0;height:0;
        border-left:6px solid transparent;
        border-right:6px solid transparent;
        border-top:8px solid ${bg};
        margin-top:-1px;">
      </div>
    </div>`,
    iconSize: [w, 38],
    iconAnchor: [w / 2, 38],
    popupAnchor: [0, -40]
  });
}

function placeMarker(p) {
  if (mapMarkers[p.id]) leafMap.removeLayer(mapMarkers[p.id]);
  const m = L.marker([p.lat, p.lng], { icon: markerIcon(p) }).addTo(leafMap);
  m.on('click', (e) => { L.DomEvent.stopPropagation(e); openSheet(p.id); });
  mapMarkers[p.id] = m;
}

function refreshMarker(id) {
  const p = SPOTS.find(x=>x.id===id);
  if (p) placeMarker(p);
}

// ── Bottom Sheet ──
function openSheet(id) {
  // 마커 클릭 → 지도 click 이벤트가 즉시 발동되어 닫히는 것 차단
  sheetJustOpened = true;
  setTimeout(() => { sheetJustOpened = false; }, 350);

  sheetSpotId = id;
  const p = SPOTS.find(x=>x.id===id);
  const s = getS(id);
  const tsUrl = p.tsSearch ? `https://www.templestay.com/templestay_list.asp?searchTxt=${encodeURIComponent(p.tsSearch)}` : null;
  const mapUrl = `https://map.kakao.com/link/to/${encodeURIComponent(p.name+' '+p.place)},${p.lat},${p.lng}`;

  document.getElementById('s-num').textContent = p.id;
  document.getElementById('s-place').textContent = p.place;
  document.getElementById('s-name').textContent = p.name;
  const catEl = document.getElementById('s-cat');
  catEl.textContent = CAT_EMOJI[p.cat]+' '+p.cat;
  catEl.className = 'cat-chip cat-'+p.cat;
  document.getElementById('s-when').textContent = '"'+p.when+'"';

  const stBtn = document.getElementById('s-stamp-btn');
  stBtn.textContent = s.checked ? '✅ 완료!' : '🔖 도장 찍기';
  stBtn.className = 'sa-btn sa-stamp' + (s.checked ? ' done' : '');

  const tsBtn = document.getElementById('s-ts-btn');
  if (tsUrl) { tsBtn.href = tsUrl; tsBtn.className = 'sa-btn sa-ts'; tsBtn.textContent = '🏯 예약'; }
  else { tsBtn.href = '#'; tsBtn.className = 'sa-btn sa-ts disabled'; tsBtn.textContent = '🏯 예약불가'; tsBtn.onclick = e=>e.preventDefault(); }

  document.getElementById('s-map-btn').href = mapUrl;

  renderSheetPhotos(id);
  document.getElementById('bottomSheet').classList.add('open');

  // 지도 중심 이동
  leafMap.setView([p.lat, p.lng], 10, {animate:true});
}

function renderSheetPhotos(id) {
  const s = getS(id);
  const photos = s.photos || [];
  const row = document.getElementById('s-photos');
  row.innerHTML = photos.map((ph,i)=>
    `<img class="sph-thumb" src="${ph}" onclick="openLb(${id},${i})">`
  ).join('') +
  `<div class="sph-add" onclick="triggerPhoto(${id})">📷</div>`;
}

function closeSheet() {
  document.getElementById('bottomSheet').classList.remove('open');
  sheetSpotId = null;
}

function toggleCheckFromSheet() {
  if (sheetSpotId === null) return;
  const s = getS(sheetSpotId);
  s.checked = !s.checked;
  state[sheetSpotId] = s;
  saveState();
  refreshMarker(sheetSpotId);
  openSheet(sheetSpotId); // re-render sheet
  updateProgress();
  if (s.checked) showToast(SPOTS.find(p=>p.id===sheetSpotId).name+' 도장 완료! 🔖');
}

// ══════════════════════════════════════════
//  Progress
// ══════════════════════════════════════════
function updateProgress() {
  const done = SPOTS.filter(p=>getS(p.id).checked).length;
  const circ = 119.4;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('ringVal').style.strokeDashoffset = circ - (circ * done / 22);
}

// ══════════════════════════════════════════
//  List + Filter
// ══════════════════════════════════════════
let currentFilter = 'all';

function filter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  let list = currentFilter==='all' ? SPOTS
    : currentFilter==='done' ? SPOTS.filter(p=>getS(p.id).checked)
    : SPOTS.filter(p=>p.cat===currentFilter);

  document.getElementById('cardList').innerHTML = list.map((p,i)=>cardHTML(p,i+1)).join('');
}

function cardHTML(p, rank) {
  const s = getS(p.id);
  const photos = s.photos||[];
  const tsUrl = p.tsSearch ? `https://www.templestay.com/templestay_list.asp?searchTxt=${encodeURIComponent(p.tsSearch)}` : null;
  const mapUrl = `https://map.kakao.com/link/to/${encodeURIComponent(p.name+' '+p.place)},${p.lat},${p.lng}`;

  return `
  <div class="card ${s.checked?'stamped':''}" id="card-${p.id}">
    <div class="card-top">
      <div class="num-badge">${p.id}</div>
      <div class="card-info">
        <div class="card-place">${p.place}</div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;">
          <span class="card-name">${p.name}</span>
          <span class="cat-chip cat-${p.cat}">${CAT_EMOJI[p.cat]} ${p.cat}</span>
        </div>
        <div class="card-when">"${p.when}"</div>
      </div>
      <div class="stamp-col">
        <div class="stamp-btn ${s.checked?'done':''} ${photos.length?'has-photo':''}"
             onclick="toggleCheck(${p.id})" id="sb-${p.id}">
          <span class="s-icon">🔖</span>
          <img class="s-img" src="${photos[0]||''}" alt=""/>
          <div class="s-overlay">✅</div>
        </div>
        <div class="stamp-lbl">${s.checked?'완료':'도장'}</div>
      </div>
    </div>
    ${photos.length ? `
    <div class="photo-strip show" id="ps-${p.id}">
      ${photos.map((ph,i)=>`<img class="p-thumb" src="${ph}" onclick="openLb(${p.id},${i})">`).join('')}
      <div class="p-add" onclick="triggerPhoto(${p.id})">📷</div>
    </div>` : ''}
    <div class="card-actions">
      ${tsUrl
        ? `<a class="action-btn ts" href="${tsUrl}" target="_blank">🏯 템플스테이 예약</a>`
        : `<span class="action-btn disabled">🏯 예약불가</span>`}
      <button class="action-btn photo" onclick="triggerPhoto(${p.id})">📷 인증샷</button>
      <a class="action-btn map" href="${mapUrl}" target="_blank">🗺 길찾기</a>
    </div>
  </div>`;
}

function toggleCheck(id) {
  const s = getS(id);
  s.checked = !s.checked;
  state[id] = s; saveState();
  renderCards();
  refreshMarker(id);
  updateProgress();
  if (s.checked) showToast(SPOTS.find(p=>p.id===id).name+' 도장 완료! 🔖');
}

// ══════════════════════════════════════════
//  Photo
// ══════════════════════════════════════════
let photoTargetId = null;

function triggerPhoto(id) {
  photoTargetId = id;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInput').click();
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file || !photoTargetId) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const s = getS(photoTargetId);
    s.photos = s.photos||[];
    s.photos.push(ev.target.result);
    s.checked = true;
    state[photoTargetId] = s; saveState();
    refreshMarker(photoTargetId);
    updateProgress();
    if (currentView==='map' && sheetSpotId===photoTargetId) renderSheetPhotos(photoTargetId);
    renderCards();
    showToast('인증샷 등록 완료! 📸');
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════
//  Lightbox
// ══════════════════════════════════════════
let lbId=null, lbIdx=null;

function openLb(id, idx) {
  lbId=id; lbIdx=idx;
  document.getElementById('lbImg').src = getS(id).photos[idx];
  document.getElementById('lightbox').classList.add('open');
}

function lbBg(e) { if(e.target===document.getElementById('lightbox')) closeLb(); }
function closeLb() { document.getElementById('lightbox').classList.remove('open'); lbId=null; lbIdx=null; }

function deletePhoto() {
  if(lbId===null) return;
  const s = getS(lbId);
  s.photos.splice(lbIdx,1);
  if(!s.photos.length) s.checked=false;
  state[lbId]=s; saveState();
  closeLb();
  refreshMarker(lbId);
  updateProgress();
  if(currentView==='map'&&sheetSpotId===lbId) renderSheetPhotos(lbId);
  renderCards();
}

// ══════════════════════════════════════════
//  Share
// ══════════════════════════════════════════
async function shareApp() {
  const done = SPOTS.filter(p=>getS(p.id).checked).length;
  const text = `🏯 기운이 샘솟는 명당 22곳 도장깨기\n나는 ${done}/22곳 완료!\n\n조용헌 선생의 풍수 명당, 같이 돌아봐요 🙏`;
  if (navigator.share) {
    try { await navigator.share({title:'명당 22곳 도장깨기', text, url: location.href}); } catch {}
  } else {
    try { await navigator.clipboard.writeText(text+'\n'+location.href); showToast('클립보드에 복사됐어요 📋'); }
    catch { showToast('이 파일을 Netlify에 올리면 URL로 공유 가능해요!'); }
  }
}

// ══════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════
let toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.style.display='none', 2500);
}
</script>
